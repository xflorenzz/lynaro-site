<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lynaro</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#050505;
color:white;
}

.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:linear-gradient(180deg,#111,#050505);
}

.hero h1{
font-size:70px;
margin:0;
letter-spacing:5px;
}

.hero p{
font-size:22px;
color:#aaa;
}

.btn{
margin-top:20px;
padding:15px 35px;
border-radius:40px;
background:white;
color:black;
text-decoration:none;
}


.section{
padding:60px 8%;
}


.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}


.card{
background:#111;
border-radius:25px;
padding:20px;
text-align:center;
border:1px solid #222;
}


.card img{
width:100%;
height:250px;
object-fit:contain;
border-radius:20px;
}


h2{
font-size:38px;
}


h3{
font-size:24px;
}


footer{
padding:40px;
text-align:center;
color:#666;
}

</style>

</head>


<body>


<section class="hero">

<h1>LYNARO</h1>

<p>Беспроводные наушники нового поколения</p>

<a class="btn" href="https://t.me/yourname">
Telegram
</a>

</section>



<section class="section">

<h2>Коллекция</h2>


<div class="grid">


<div class="card">
<img src="slim.jpg">
<h3>Lynaro Slim</h3>
</div>


<div class="card">
<img src="seriesx.jpg">
<h3>Lynaro Series X</h3>
</div>


<div class="card">
<img src="seriesxs.jpg">
<h3>Lynaro Series XS</h3>
</div>


<div class="card">
<img src="clips.jpg">
<h3>Lynaro Clips</h3>
</div>


<div class="card">
<img src="clipsfly.jpg">
<h3>Lynaro Clips Fly</h3>
</div>


<div class="card">
<img src="vip.jpg">
<h3>Lynaro VIP</h3>
</div>


</div>

</section>



<footer>

© Lynaro 2026

</footer>


</body>
</html>
