<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Lynaro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
}

/* ====== ТОВАРЫ ====== */
#products{
  display:flex;
  gap:20px;
  padding:30px;
  overflow-x:auto;
}

.card{
  flex:0 0 auto;
  width:280px;
  background:#111;
  border-radius:18px;
  padding:15px;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

.card h2{
  font-size:18px;
  margin:10px 0 5px;
}

.card p{
  color:#aaa;
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#ff3b7b;
  color:white;
  cursor:pointer;
}

/* ===== POPUP ===== */
.popup-bg{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:320px;
  position:relative;
}

.popup img{
  width:100%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;padding:20px;">Lynaro</h1>

<!-- ===== ТОВАРЫ ===== -->
<section id="products">

<div class="card">
<img src="slim1.jpg">
<h2>Lynaro Slim</h2>
<p>300₽</p>
<button onclick="show('slim')">Узнать больше</button>
</div>

<div class="card">
<img src="seriesx1.jpg">
<h2>Lynaro Series X</h2>
<p>700₽</p>
<button onclick="show('x')">Узнать больше</button>
</div>

<div class="card">
<img src="seriesxs1.jpg">
<h2>Lynaro Series XS</h2>
<p>500₽</p>
<button onclick="show('xs')">Узнать больше</button>
</div>

<div class="card">
<img src="clips1.jpg">
<h2>Lynaro Clips</h2>
<p>600₽</p>
<button onclick="show('clips')">Узнать больше</button>
</div>

<div class="card">
<img src="clipsfly1.jpg">
<h2>Lynaro Clips Fly</h2>
<p>900₽</p>
<button onclick="show('fly')">Узнать больше</button>
</div>

<div class="card">
<img src="vip1.jpg">
<h2>Lynaro VIP</h2>
<p>1200₽</p>
<button onclick="show('vip')">Узнать больше</button>
</div>

</section>

<!-- ===== POPUP ===== -->
<div class="popup-bg" id="popup">
<div class="popup">
<div class="close" onclick="closePopup()">✖</div>

<img id="p-img">
<h2 id="p-title"></h2>
<p id="p-price"></p>
<ul id="p-spec"></ul>

</div>
</div>

<script>

function show(type){

const data = {

slim:{
title:"Lynaro Slim",
img:"slim1.jpg",
price:"300₽",
spec:["Микрофон","USB-C + 3.5mm"]
},

x:{
title:"Lynaro Series X",
img:"seriesx1.jpg",
price:"700₽",
spec:["Bluetooth 5.3","Глубокие басы","Стабильное соединение"]
},

xs:{
title:"Lynaro Series XS",
img:"seriesxs1.jpg",
price:"500₽",
spec:["Bluetooth 5.3","Компактный дизайн","Баланс звука"]
},

clips:{
title:"Lynaro Clips",
img:"clips1.jpg",
price:"600₽",
spec:["Открытая посадка","Лёгкие","Комфорт"]
},

fly:{
title:"Lynaro Clips Fly",
img:"clipsfly1.jpg",
price:"900₽",
spec:["Премиум звук","Улучшенная фиксация","Стиль"]
},

vip:{
title:"Lynaro VIP",
img:"vip1.jpg",
price:"1200₽",
spec:["Hi-Fi звук","Шумоподавление","Влагозащита"]
}

};

const item = data[type];

document.getElementById("p-img").src = item.img;
document.getElementById("p-title").innerText = item.title;
document.getElementById("p-price").innerText = item.price;

const list = document.getElementById("p-spec");
list.innerHTML = "";

item.spec.forEach(i=>{
let li = document.createElement("li");
li.innerText = i;
list.appendChild(li);
});

document.getElementById("popup").style.display = "flex";

}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
