<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lynaro</title>

<style>

/* ===== BACKGROUND ===== */
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
color:white;
}

/* ===== HEADER ===== */
header{
text-align:center;
padding:40px 20px;
}

header h1{
color:white;
font-size:40px;
margin:0;
}

header p{
opacity:0.7;
margin-top:10px;
}

header button{
margin-top:20px;
padding:12px 20px;
border-radius:20px;
border:1px solid #d4af37;
background:transparent;
color:white;
cursor:pointer;
}

/* ===== PRODUCTS GRID ===== */
.products{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:25px;
padding:50px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(212,175,37,0.4);
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

/* IMAGE */
.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}

/* PRICE */
.price{
color:#d4af37;
font-weight:bold;
}

/* BUTTONS */
.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.buttons button{
flex:1;
padding:12px 0;
border-radius:15px;
border:none;
cursor:pointer;
}

/* MORE */
.more-btn{
border:1px solid #d4af37;
background:transparent;
color:white;
}

.more-btn:hover{
background:#d4af37;
color:black;
}

/* BUY */
.buy-btn{
background:linear-gradient(135deg,#d4af37,#fff1a8,#b8860b);
color:black;
font-weight:bold;
}

/* ===== CONTACTS ===== */
.contacts{
text-align:center;
padding:40px;
opacity:0.8;
}

.contacts a{
color:#d4af37;
display:block;
margin:5px 0;
text-decoration:none;
}

/* ===== POPUP ===== */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:20px;
border-radius:20px;
width:300px;
text-align:center;
}

.popup img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Lynaro</h1>
<p>Premium Audio Collection</p>
<button onclick="scrollToProducts()">Выбрать модель</button>
</header>

<div class="products" id="products">

<!-- CARD -->
<div class="card" onclick="openProduct('Slim')">
<img src="slim1.jpg">
<h2>Slim</h2>
<div class="price">300₽</div>

<div class="buttons">
<button class="more-btn" onclick="openProduct('Slim')">Подробнее</button>
<button class="buy-btn">Купить</button>
</div>
</div>

<div class="card" onclick="openProduct('Series X')">
<img src="slim1.jpg">
<h2>Series X</h2>
<div class="price">700₽</div>

<div class="buttons">
<button class="more-btn">Подробнее</button>
<button class="buy-btn">Купить</button>
</div>
</div>

</div>

<!-- CONTACTS -->
<div class="contacts">
<h3>Контакты</h3>
<a href="mailto:lynaroask@gmail.com">lynaroask@gmail.com</a>
<a href="#">VK</a>
<a href="#">MAX</a>
<a href="#">Telegram</a>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<span class="close" onclick="closeProduct()">×</span>
<img src="slim1.jpg" id="popupImg">
<h2 id="popupTitle"></h2>
<p>Характеристики появятся тут</p>
</div>
</div>

<script>

function openProduct(name){
document.getElementById('popup').style.display='flex';
document.getElementById('popupTitle').innerText=name;
}

function closeProduct(){
document.getElementById('popup').style.display='none';
}

function scrollToProducts(){
document.getElementById('products').scrollIntoView({behavior:'smooth'});
}

</script>

</body>
</html>
