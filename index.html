<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYNARO</title>

<style>

/* ===== GLOBAL ===== */
html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#050505,#1a1205,#3a2a08);
color:white;
}

/* ===== CONTACT BUTTON ===== */
.contact-btn{
position:fixed;
top:15px;
right:15px;
z-index:99999;
padding:10px 14px;
border:1px solid #d4af37;
border-radius:12px;
background:rgba(0,0,0,.4);
color:white;
cursor:pointer;
backdrop-filter:blur(6px);
}

/* ===== HEADER ===== */
header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
z-index:1;
}

header h1{
font-size:60px;
margin:0;
background:linear-gradient(90deg,#fff,#d4af37,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:4px;
}

header button{
margin-top:70px;
padding:12px 25px;
border-radius:20px;
border:1px solid #d4af37;
background:transparent;
color:white;
cursor:pointer;
}

/* ===== PRODUCTS ===== */
.products{
padding:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* 💣 FIX 1 — карточки ровные + кнопки всегда снизу */
.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(212,175,55,.4);
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
position:relative;
}

.card img{
width:100%;
border-radius:15px;
}

.card h2{
margin:10px 0 5px;
}

.price{
background:linear-gradient(90deg,#d4af37,#fff1a8,#b8860b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

/* BADGE */
.badge{
position:absolute;
top:10px;
left:10px;
background:#d4af37;
color:black;
padding:4px 8px;
border-radius:10px;
font-size:12px;
}

/* ===== BUTTONS ===== */
.buttons{
margin-top:auto; /* 💣 FIX 1 ключ */
display:flex;
gap:10px;
}

.more-btn{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #d4af37;
background:transparent;
color:white;
cursor:pointer;
}

.more-btn:hover{
background:#d4af37;
color:black;
}

.buy-btn{
flex:1;
padding:10px;
border-radius:12px;
border:none;
background:linear-gradient(135deg,#d4af37,#fff1a8,#b8860b);
cursor:pointer;
}

/* ===== WHY ===== */
.why{
text-align:center;
padding:70px 20px;
}

.why-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

/* ===== CONTACTS ===== */
#contacts{
text-align:center;
padding:60px 20px;
}

/* ===== POPUP ===== */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup-content{
width:320px;
background:linear-gradient(145deg,#111,#1f1605);
border:1px solid #d4af37;
border-radius:20px;
padding:20px;
animation:pop .2s ease;
}

.popup-content img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:24px;
cursor:pointer;
}

</style>
</head>

<body>

<script>
