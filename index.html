<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lynaro</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top,#3b2a1a,#080808 45%);
color:white;
}


.hero{

min-height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;

}


.logo{
font-size:70px;
letter-spacing:8px;
font-weight:bold;
}


.hero p{

font-size:22px;
color:#cfcfcf;

}


.telegram{

margin-top:25px;
padding:15px 35px;
border-radius:40px;
background:#d8a85b;
color:#111;
text-decoration:none;
font-weight:bold;

}


.catalog{

padding:60px 8%;

}


.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;

}


.card{

background:#151515;
border-radius:25px;
padding:20px;
text-align:center;
transition:.3s;
border:1px solid #333;

}


.card:hover{

transform:translateY(-8px);
border-color:#d8a85b;

}


.card img{

width:100%;
height:230px;
object-fit:contain;

}


.card a{

text-decoration:none;
color:white;

}


h2{

font-size:40px;

}


</style>

</head>


<body>


<section class="hero">

<div class="logo">LYNARO</div>

<p>Технологии, которые хочется носить</p>

<a class="telegram" href="https://t.me/yourname">
Связаться в Telegram
</a>

</section>



<section class="catalog">


<h2>Коллекция</h2>


<div class="grid">


<div class="card">
<a href="slim.html">
<img src="slim.jpg">
<h3>Lynaro Slim</h3>
</a>
</div>


<div class="card">
<a href="seriesx.html">
<img src="seriesx.jpg">
<h3>Lynaro Series X</h3>
</a>
</div>


<div class="card">
<a href="seriesxs.html">
<img src="seriesxs.jpg">
<h3>Lynaro Series XS</h3>
</a>
</div>


<div class="card">
<a href="clips.html">
<img src="clips.jpg">
<h3>Lynaro Clips</h3>
</a>
</div>


<div class="card">
<a href="clipsfly.html">
<img src="clipsfly.jpg">
<h3>Lynaro Clips Fly</h3>
</a>
</div>


<div class="card">
<a href="vip.html">
<img src="vip.jpg">
<h3>Lynaro VIP</h3>
</a>
</div>


</div>

</section>


</body>

</html>
