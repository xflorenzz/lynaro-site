<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lynaro</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
background:
linear-gradient(135deg,#050505,#1c1505);
}


header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}


.logo{
font-size:70px;
letter-spacing:8px;
color:#d4af37;
}


.subtitle{
color:#aaa;
font-size:20px;
}


.main-btn{

margin-top:30px;
padding:16px 40px;

border-radius:30px;
border:1px solid #d4af37;

background:#d4af37;
color:black;

font-size:18px;
cursor:pointer;

}



.products{

padding:50px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}



.card{

background:rgba(255,255,255,.08);

border:1px solid rgba(212,175,37,.5);

border-radius:25px;

padding:20px;

cursor:pointer;

transition:.3s;

}



.card:hover{

transform:translateY(-10px);

}



.card img{

width:100%;
height:230px;

object-fit:cover;

border-radius:20px;

}



.card h2{

color:#d4af37;

}


.price{

font-size:24px;
font-weight:bold;

}




.contacts{

margin:40px;

padding:30px;

text-align:center;

background:#111;

border-radius:25px;

border:1px solid #d4af37;

}



.contacts a{

display:inline-block;

margin:10px;

padding:12px 25px;

background:#d4af37;

color:black;

border-radius:20px;

text-decoration:none;

}




/* POPUP */


.popup{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.85);

justify-content:center;

align-items:center;

z-index:10;

}



.popup-box{

width:350px;

background:#111;

border-radius:30px;

padding:25px;

border:1px solid #d4af37;

text-align:center;

}



.popup-box img{

width:100%;

border-radius:20px;

}



.close{

color:#d4af37;

font-size:25px;

cursor:pointer;

text-align:right;

}



li{

margin:10px;

}



</style>

</head>


<body>



<header>


<div class="logo">
LYNARO
</div>


<div class="subtitle">
Аксессуары нового уровня
</div>



<button class="main-btn"
onclick="document.getElementById('products').scrollIntoView()">

Выбрать модель

</button>


</header>





<div class="products" id="products">



<div class="card" onclick="openProduct('slim')">

<img src="slim.jpg">

<h2>Lynaro Slim</h2>

<div class="price">300₽</div>

</div>



<div class="card" onclick="openProduct('x')">

<img src="seriesx.jpg">

<h2>Series X</h2>

<div class="price">700₽</div>

</div>




<div class="card" onclick="openProduct('xs')">

<img src="seriesxs.jpg">

<h2>Series XS</h2>

<div class="price">500₽</div>

</div>





<div class="card" onclick="openProduct('clips')">

<img src="clips.jpg">

<h2>Clips</h2>

<div class="price">600₽</div>

</div>






<div class="card" onclick="openProduct('fly')">

<img src="clipsfly.jpg">

<h2>Clips Fly</h2>

<div class="price">900₽</div>

</div>







<div class="card" onclick="openProduct('vip')">

<img src="vip.jpg">

<h2>VIP</h2>

<div class="price">1200₽</div>

</div>



</div>






<div class="contacts">


<h2>Контакты</h2>

<p>
lynaroask@gmail.com
</p>


<a href="#">VK</a>

<a href="#">MAX</a>

<a href="#">TG</a>


</div>








<div class="popup" id="popup">


<div class="popup-box">


<div class="close" onclick="closePopup()">
✖
</div>


<img id="pimg">


<h2 id="ptitle"></h2>


<h2 id="pprice"></h2>


<ul id="plist"></ul>



</div>

</div>








<script>


const products={


slim:{
name:"Lynaro Slim",
img:"slim1.jpg",
price:"300₽",
info:[
"Микрофон",
"USB-C + 3.5MM",
"Bluetooth 5.3"
]
},


x:{
name:"Series X",
img:"seriesx1.jpg",
price:"700₽",
info:[
"Bluetooth 5.3",
"Глубокие басы",
"Чистый звук"
]
},


xs:{
name:"Series XS",
img:"seriesxs1.jpg",
price:"500₽",
info:[
"Компактный дизайн",
"Стабильное соединение"
]
},


clips:{
name:"Clips",
img:"clips1.jpg",
price:"600₽",
info:[
"Лёгкая конструкция",
"Удобная фиксация"
]
},


fly:{
name:"Clips Fly",
img:"clipsfly1.jpg",
price:"900₽",
info:[
"Bluetooth 5.3",
"Стерео звук"
]
},


vip:{
name:"VIP",
img:"vip1.jpg",
price:"1200₽",
info:[
"Премиальный звук",
"Влагозащита"
]
}


};





function openProduct(id){


let p=products[id];


document.getElementById("pimg").src=p.img;

document.getElementById("ptitle").innerHTML=p.name;

document.getElementById("pprice").innerHTML=p.price;



let list=document.getElementById("plist");

list.innerHTML="";


p.info.forEach(x=>{

let li=document.createElement("li");

li.innerHTML=x;

list.appendChild(li);


});


document.getElementById("popup").style.display="flex";


}



function closePopup(){

document.getElementById("popup").style.display="none";

}


</script>


</body>
</html>
