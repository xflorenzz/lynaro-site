<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lynaro</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
background:
linear-gradient(135deg,#050505,#1c1505);
}


header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}


.logo{
font-size:70px;
letter-spacing:8px;
color:white;
}


.subtitle{
color:#aaa;
font-size:20px;
}


.main-btn{

margin-top:30px;
padding:16px 40px;

border-radius:30px;
border:1px solid #d4af37;

background:#d4af37;
color:black;

font-size:18px;
cursor:pointer;

}



.products{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:25px;
padding:50px;
}


.card{
background:rgba(255,255,255,.08);
border:1px solid rgba(212,175,37,.5);
border-radius:25px;
padding:20px;
cursor:pointer;
transition:.3s;

display:flex;
flex-direction:column;
gap:10px;

overflow:hidden;
}

}



.card:hover{

transform:translateY(-10px);

}



.card img{

width:100%;
height:230px;

object-fit:cover;

border-radius:20px;

}



.card h2{

color:#white;

}


.price{

font-size:24px;
font-weight:bold;

background:linear-gradient(
90deg,
#d4af37,
#fff1a8,
#b8860b
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}




.contacts{

margin:40px;

padding:30px;

text-align:center;

background:#111;

border-radius:25px;

border:1px solid #d4af37;

}



.contacts a{

display:inline-block;

margin:10px;

padding:12px 25px;

background:#d4af37;

color:black;

border-radius:20px;

text-decoration:none;

}




/* POPUP */


.popup{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.85);

justify-content:center;

align-items:center;

z-index:10;

}



.popup-box{

width:350px;

background:#111;

border-radius:30px;

padding:25px;

border:1px solid #d4af37;

text-align:center;

}



.popup-box img{

width:100%;

border-radius:20px;

}



.close{

color:#d4af37;

font-size:25px;

cursor:pointer;

text-align:right;

}



li{

margin:10px;

}

.more-btn{
  
border:1px solid #d4af37;

background:transparent;

color:white;

cursor:pointer;

transition:.25s;

border-radius:16px;

}


.more-btn:hover{

background:#d4af37;

color:black;

}

  .top-contact{

position:fixed;

top:25px;
right:25px;

padding:12px 25px;

border-radius:25px;

background:rgba(212,175,37,.15);

border:1px solid #d4af37;

color:white;

cursor:pointer;

backdrop-filter:blur(10px);

z-index:20;

}


.top-contact:hover{

background:#d4af37;

color:black;

}

  footer{

text-align:center;

padding:30px;

color:#777;

font-size:14px;

letter-spacing:3px;

}

  html{
scroll-behavior:smooth;
}

  .card:before{

content:"";

position:absolute;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:linear-gradient(
120deg,
transparent,
rgba(212,175,37,.15),
transparent
);

transform:rotate(25deg);

transition:.5s;

}


.card:hover:before{

left:100%;

}

  .subtitle{

color:#aaa;

font-size:16px;

letter-spacing:3px;

margin-top:10px;

text-transform:uppercase;

} 

  .badge{

position:absolute;

top:15px;
right:15px;

background:#d4af37;

color:black;

padding:6px 15px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}

.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

.buttons button{
flex:1;
padding:12px 0;
border-radius:16px;
}


.more-btn,
.buy-btn{

flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:12px 0;
font-size:14px;
border-status:18px;
box-sizing:border-box;

}


.buy-btn{

background:linear-gradient(
135deg,
#d4af37,
#fff1a8,
#b8860b
);

color:#050505;

border:none;

font-weight:bold;

border-radius:16px;

box-shadow:
0 0 15px rgba(212,175,37,.35);

transition:.25s;
  
cursor:pointer;

}


.buy-btn:hover{

background:white;

transform:scale(1.05);

box-shadow:
0 0 25px rgba(212,175,37,.7);

}

.products{
display:grid !important;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)) !important;
gap:25px !important;
padding:50px !important;
width:100% !important;
}

.card{
width:100% !important;
max-width:none !important;
}


</style>

</head>


<body>

<div class="card" onclick="openProduct('fly')">
  <div class="badge">

<img src="clipsfly1.jpg">

<div class="card" onclick="openProduct('vip')">

<div class="popup" id="popup">


<div class="popup-box">


<div class="close" onclick="closePopup()">
✖
</div>


<img id="pimg">


<h2 id="ptitle"></h2>


<h2 id="pprice"></h2>


<ul id="plist"></ul>



</div>

</div>








<script>


const products={


slim:{
name:"Lynaro Slim",
img:"slim1.jpg",
price:"300₽",
info:[
"Микрофон",
"USB-C + 3.5MM",
"Bluetooth 5.3"
]
},


x:{
name:"Series X",
img:"seriesx1.jpg",
price:"700₽",
info:[
"Bluetooth 5.3",
"Глубокие басы",
"Чистый звук"
]
},


xs:{
name:"Series XS",
img:"seriesxs1.jpg",
price:"500₽",
info:[
"Компактный дизайн",
"Стабильное соединение"
]
},


clips:{
name:"Clips",
img:"clips1.jpg",
price:"600₽",
info:[
"Лёгкая конструкция",
"Удобная фиксация"
]
},


fly:{
name:"Clips Fly",
img:"clipsfly1.jpg",
price:"900₽",
info:[
"Bluetooth 5.3",
"Стерео звук"
]
},


vip:{
name:"VIP",
img:"vip1.jpg",
price:"1200₽",
info:[
"Премиальный звук",
"Влагозащита"
]
}


};





function openProduct(id){


let p=products[id];


document.getElementById("pimg").src=p.img;

document.getElementById("ptitle").innerHTML=p.name;

document.getElementById("pprice").innerHTML=p.price;



let list=document.getElementById("plist");

list.innerHTML="";


p.info.forEach(x=>{

let li=document.createElement("li");

li.innerHTML=x;

list.appendChild(li);


});


document.getElementById("popup").style.display="flex";


}



function closePopup(){

document.getElementById("popup").style.display="none";

}


</script>

  <footer>
