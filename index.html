<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYNARO</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial,sans-serif;

/* золото + черный глубокий */
background:linear-gradient(135deg,#050505,#1a1205,#3a2a08,#0a0a0a);
color:white;
}

/* ===== CONTACT BUTTON ===== */
.contact-btn{
position:fixed;
top:15px;
right:15px;
z-index:99999;
padding:10px 14px;
border:1px solid #d4af37;
border-radius:12px;
background:rgba(0,0,0,.4);
color:white;
cursor:pointer;
backdrop-filter:blur(6px);
}

/* ===== HEADER ===== */
header{
height:55vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:65px;
margin:0;
letter-spacing:4px;

/* белый металл + золото */
background:linear-gradient(90deg,#fff,#d4af37,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

header p{
opacity:.8;
margin-top:10px;
}

header button{
margin-top:70px;
padding:12px 25px;
border-radius:20px;
border:1px solid #d4af37;
background:transparent;
color:white;
cursor:pointer;
}

header button:hover{
background:#d4af37;
color:black;
}

/* ===== PRODUCTS ===== */
.products{
padding:50px;
margin-top:70px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* карточка */
.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(212,175,55,.4);
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
position:relative;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(212,175,55,.25);
}

/* золотой блик */
.card::before{
content:"";
position:absolute;
top:-100%;
left:-100%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);
transform:rotate(25deg);
transition:.6s;
}

.card:hover::before{
top:100%;
left:100%;
}

/* картинка */
.card img{
width:100%;
border-radius:15px;
}

/* название */
.card h2{
color:white;
margin:10px 0 5px;
}

/* цена */
.price{
background:linear-gradient(90deg,#d4af37,#fff1a8,#b8860b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

/* бейдж */
.badge{
position:absolute;
top:10px;
left:10px;
background:#d4af37;
color:black;
padding:4px 8px;
border-radius:10px;
font-size:12px;
}

/* ===== BUTTONS FIX ===== */
.buttons{
margin-top:auto; /* ВАЖНО: фиксирует низ карточки */
display:flex;
gap:10px;
}

.more-btn{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #d4af37;
background:transparent;
color:white;
cursor:pointer;
}

.more-btn:hover{
background:#d4af37;
color:black;
}

.buy-btn{
flex:1;
padding:10px;
border-radius:12px;
border:none;
cursor:pointer;
background:linear-gradient(135deg,#d4af37,#fff1a8,#b8860b);
}

/* ===== WHY ===== */
.why{
text-align:center;
padding:70px 20px;
}

.why-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.why-grid div{
background:rgba(255,255,255,.05);
border:1px solid rgba(212,175,55,.3);
padding:15px;
border-radius:15px;
}

/* ===== CONTACTS ===== */
#contacts{
text-align:center;
padding:60px 20px;
}

#contacts a{
display:block;
margin:8px;
color:white;
text-decoration:none;
opacity:.8;
}

#contacts a:hover{
opacity:1;
color:#d4af37;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:20px;
opacity:.6;
}

/* ===== POPUP ===== */
.popup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.85);
z-index:999999;
}

.popup-content{
width:340px;
background:linear-gradient(145deg,#111,#1f1605);
border:1px solid #d4af37;
border-radius:20px;
padding:20px;
animation:pop .2s ease;
}

.popup-content img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.card{
display:flex;
flex-direction:column;
justify-content:space-between;
height:100%;
}

.card h2{
min-height:40px;
display:flex;
align-items:center;
}

.price{
min-height:20px;
display:flex;
align-items:center;
}

.card img{
height:300px;
width:100%;
object-fit:cover;
border-radius:15px;
}

*{
box-sizing:border-box;
}

@media (max-width:600px){

.products{
grid-template-columns:1fr;
padding:20px;
gap:15px;
}

.card{
padding:12px;
}

}

.card{
position:relative;
overflow:hidden;
}

.card::before{
pointer-events:none;
}

.card::before{
padding-bottom:20px;
}

.card{
min-height:470px !important;
}

</style>
</head>
