<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LYNARO</title>

<style>

/* ====== GLOBAL ====== */
html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#050505,#0a0a0a,#1a1405);
color:white;
}

/* ====== HEADER ====== */
header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

header h1{
font-size:60px;
margin:0;
color:white;
letter-spacing:4px;

/* металл + золото эффект */
background:linear-gradient(90deg,#fff,#d4af37,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

header p{
opacity:.8;
margin-top:10px;
}

header button{
margin-top:70px;
padding:12px 25px;
border-radius:20px;
border:1px solid #d4af37;
background:transparent;
color:white;
cursor:pointer;
}

header button:hover{
background:#d4af37;
color:black;
}

/* ====== CONTACT BUTTON ====== */
.contact-btn{
position:fixed;
top:15px;
right:15px;
padding:8px 12px;
border:1px solid #d4af37;
border-radius:12px;
background:transparent;
color:white;
cursor:pointer;
z-index:100;
}

/* ====== PRODUCTS ====== */
.products{
padding:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:70px;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(212,175,55,.4);
border-radius:20px;
padding:15px;
position:relative;
cursor:pointer;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(212,175,55,.2);
}

/* золотой блик */
.card::before{
content:"";
position:absolute;
top:-100%;
left:-100%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.2),transparent);
transform:rotate(25deg);
transition:.6s;
}

.card:hover::before{
top:100%;
left:100%;
}

.card img{
width:100%;
border-radius:15px;
}

.card h2{
color:white;
margin:10px 0 5px;
}

.price{
background:linear-gradient(90deg,#d4af37,#fff1a8,#b8860b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

/* BADGES */
.badge{
position:absolute;
top:10px;
left:10px;
background:#d4af37;
color:black;
padding:3px 8px;
border-radius:10px;
font-size:12px;
}

/* BUTTONS */
.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

.buttons button{
flex:1;
padding:10px;
border-radius:12px;
border:none;
cursor:pointer;
}

.more-btn{
background:transparent;
border:1px solid #d4af37;
color:white;
}

.more-btn:hover{
background:#d4af37;
color:black;
}

.buy-btn{
background:linear-gradient(135deg,#d4af37,#fff1a8,#b8860b);
color:black;
font-weight:bold;
}

/* WHY BLOCK */
.why{
text-align:center;
padding:60px 20px;
}

.why-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.why-grid div{
background:rgba(255,255,255,.05);
border:1px solid rgba(212,175,55,.3);
padding:15px;
border-radius:15px;
}

/* CONTACTS */
#contacts{
text-align:center;
padding:60px 20px;
}

#contacts a{
display:block;
margin:8px;
color:white;
text-decoration:none;
opacity:.8;
}

#contacts a:hover{
opacity:1;
color:#d4af37;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:.6;
}

</style>
</head>
