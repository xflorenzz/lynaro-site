<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynaro</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b0b0b;
color: white;
}

.hero {
padding: 100px 10%;
text-align: center;
background: radial-gradient(circle at top, #222, #0b0b0b);
}

.hero h1 {
font-size: 60px;
margin-bottom: 10px;
}

.hero p {
color: #aaa;
font-size: 20px;
}

.btn {
display: inline-block;
margin-top: 25px;
padding: 14px 28px;
background: white;
color: black;
border-radius: 30px;
text-decoration: none;
}

.section {
padding: 80px 10%;
}

.title {
font-size: 36px;
margin-bottom: 40px;
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 20px;
}

.card {
background: #151515;
padding: 20px;
border-radius: 20px;
border: 1px solid #222;
text-align: center;
}

.card img {
width: 100%;
border-radius: 15px;
margin-bottom: 10px;
}

footer {
text-align: center;
padding: 40px;
color: #777;
}
</style>

</head>

<body>

<div class="hero">
<h1>Lynaro</h1>
<p>Беспроводные наушники нового поколения</p>
<a class="btn" href="#models">Смотреть модели</a>
<a class="btn" href="https://t.me/yourname">Telegram</a>
</div>

<div class="section" id="models">
<div class="title">Линейка</div>

<div class="grid">

<div class="card">
<img src="images/slim.jpg">
<h3>Lynaro Slim</h3>
</div>

<div class="card">
<img src="seriesx.jpg">
<h3>Lynaro Series X</h3>
</div>

<div class="card">
<img src="seriesxs.jpg">
<h3>Lynaro Series XS</h3>
</div>

<div class="card">
<img src="clips.jpg">
<h3>Lynaro Clips</h3>
</div>

<div class="card">
<img src="clipsfly.jpg">
<h3>Lynaro Clips Fly</h3>
</div>

<div class="card">
<img src="vip.jpg">
<h3>Lynaro VIP</h3>
</div>

</div>
</div>

<footer>
© Lynaro 2026
</footer>

</body>
</html>
